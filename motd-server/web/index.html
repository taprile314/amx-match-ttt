<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>TTT 2026</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden}
  body{
    font-family:Tahoma,Arial,sans-serif;
    color:#EAF0FF;
    background:#0C1530;
    background-image:radial-gradient(circle at 50% -20%,#21409A 0%,#16275E 42%,#0C1530 80%);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{padding:10px 14px}
  /* Header horizontal: logo al costado para ahorrar alto vertical */
  .head{width:100%}
  .head td{vertical-align:middle}
  .head img{height:62px;width:auto;display:block;filter:drop-shadow(0 3px 7px rgba(0,0,0,.45))}
  .logocell{width:62px;padding-right:14px}
  .title{font-size:24px;font-weight:bold;letter-spacing:3px;color:#FFFFFF;line-height:1}
  .sub{font-size:10px;letter-spacing:4px;color:#E9A33C;text-transform:uppercase;font-weight:bold;margin-top:3px}
  .rule{height:2px;border:0;margin:9px 0;background:linear-gradient(90deg,rgba(233,163,60,0) 0%,#E9A33C 50%,rgba(233,163,60,0) 100%)}
  /* CTA compacto */
  .cta{font-size:12px;line-height:1.4;color:#C9D6F2;margin:0 0 9px}
  .cta b{color:#FFFFFF}
  .key{display:inline-block;background:#E9A33C;color:#0C1530;font-weight:bold;padding:0 7px;border-radius:3px;letter-spacing:1px}
  /* Body en dos columnas */
  .body{width:100%;table-layout:fixed}
  .body > tbody > tr > td{vertical-align:top}
  .colL{width:54%;padding-right:8px}
  .colR{width:46%;padding-left:8px}
  .card{background:rgba(33,64,154,.20);border:1px solid #2C459C;border-radius:7px;padding:9px 11px}
  h2{margin:0 0 5px;font-size:11px;letter-spacing:2px;color:#E9A33C;text-transform:uppercase;border-left:3px solid #E9A33C;padding-left:7px}
  ul{margin:0;padding:0 0 0 17px}
  li{font-size:12px;line-height:1.5;color:#D7E0F5}
  .lbl{font-size:9px;letter-spacing:2px;color:#7E8DB8;text-transform:uppercase}
  .big{font-size:15px;font-weight:bold;color:#FFFFFF;margin:2px 0 7px}
  .muted{font-size:11px;color:#C9D6F2}
</style>
</head>
<body>
  <div class="wrap">

    <table class="head" cellpadding="0" cellspacing="0"><tr>
      <td class="logocell"><img src="logo_ttt.png" alt="TTT"></td>
      <td>
        <div class="title">TTT 2026</div>
        <div class="sub">Counter-Strike 1.6</div>
      </td>
    </tr></table>

    <hr class="rule">

    <div class="cta">
      Conectate al <b>TeamSpeak</b> y avisale al admin con
      <span class="key">.ready</span> cuando tu equipo este listo.
    </div>

    <table class="body" cellpadding="0" cellspacing="0"><tr>
      <td class="colL">
        <div class="card">
          <h2>Reglas</h2>
          <ul>
            <li>[EDITAR: formato MR12]</li>
            <li>[EDITAR: mapas]</li>
            <li>El admin decide.</li>
          </ul>
        </div>
      </td>
      <td class="colR">
        <div class="card">
          <div class="lbl">TeamSpeak</div>
          <div class="big">[EDITAR: 192.168.1.X]</div>
          <div class="lbl">Soporte</div>
          <div class="muted"><b style="color:#FFF">TTT_Admin</b> &middot; en el server</div>
        </div>
      </td>
    </tr></table>

  </div>
</body>
</html>
